name: 이슈환전소 브리핑 자동 갱신

on:
  schedule:
    # UTC 기준. 한국시간(KST=UTC+9) 07,10,13,16,19,22시에 실행되도록 설정.
    - cron: '0 22,1,4,7,10,13 * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 브리핑 생성 (네이버뉴스 + Claude)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python fetch_briefing.py

      - name: briefing.json 커밋 & 푸시
        run: |
          git config user.name "briefing-bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git add briefing.json
          git diff --staged --quiet && echo "변경 없음, 커밋 생략" || git commit -m "자동 브리핑 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
